<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Listing Presentation Companion</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@400;500;600&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --navy: #1a3a5c; --navy-light: #254d75; --gold: #c8a45a; --gold-light: #e8d5a0;
    --bg: #f4f3ef; --card: #fff; --text: #2a2a2a; --text-light: #666; --border: #e2e0da;
    --action: #2e7d32; --script: #1565c0; --response: #6a1b9a; --tip: #e65100; --check: #00695c;
  }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); -webkit-font-smoothing: antialiased; }

  /* ══════════════════════════════════════════
     HEADER
     ══════════════════════════════════════════ */
  .header { background: var(--navy); position: sticky; top: 0; z-index: 100; padding: 14px 16px 0; }
  .header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; gap: 12px; }
  .header h1 { font-family: 'Playfair Display', serif; font-size: 1.2em; color: #fff; font-weight: 600; letter-spacing: 0.3px; white-space: nowrap; }
  .header-meta { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .header-meta input { font-family: 'DM Sans', sans-serif; font-size: 0.82em; background: rgba(255,255,255,0.12); border: 1px solid rgba(255,255,255,0.2); color: #fff; padding: 6px 10px; border-radius: 4px; outline: none; }
  .header-meta input::placeholder { color: rgba(255,255,255,0.45); }
  .header-meta input:focus { border-color: var(--gold); background: rgba(255,255,255,0.18); }
  .header-meta input.addr { width: 160px; }
  .header-meta input.dt { width: 110px; }

  /* ══════════════════════════════════════════
     TABS
     ══════════════════════════════════════════ */
  .tab-bar { display: flex; gap: 2px; overflow-x: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none; flex-wrap: nowrap; }
  .tab-bar::-webkit-scrollbar { display: none; }
  .tab-btn { font-family: 'DM Sans', sans-serif; font-size: 0.75em; font-weight: 600; padding: 10px 14px; border: none; background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.6); cursor: pointer; border-radius: 8px 8px 0 0; transition: all 0.2s; white-space: nowrap; letter-spacing: 0.3px; flex-shrink: 0; }
  .tab-btn .tab-full { display: inline; }
  .tab-btn .tab-num { display: none; }
  .tab-btn .tab-name { display: none; }
  .tab-btn:hover { background: rgba(255,255,255,0.15); color: rgba(255,255,255,0.85); }
  .tab-btn.active { background: var(--bg); color: var(--navy); }

  /* ══════════════════════════════════════════
     CONTENT
     ══════════════════════════════════════════ */
  .content { max-width: 900px; margin: 0 auto; padding: 0 16px 72px; }
  .tab-panel { display: none; padding-top: 16px; }
  .tab-panel.active { display: block; }

  /* ══════════════════════════════════════════
     SECTIONS & CARDS
     ══════════════════════════════════════════ */
  .section-title { font-family: 'Playfair Display', serif; font-size: 1.1em; color: var(--navy); margin: 20px 0 10px; padding-bottom: 5px; border-bottom: 2px solid var(--gold-light); }
  .section-title:first-child { margin-top: 0; }

  .card { background: var(--card); border-radius: 8px; box-shadow: 0 1px 4px rgba(0,0,0,0.06); margin-bottom: 8px; overflow: hidden; }
  .card-header { display: flex; align-items: flex-start; gap: 8px; padding: 10px 12px; cursor: pointer; user-select: none; }
  .card-header:hover { background: #fafaf8; }

  .card-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; margin-top: 6px; }
  .card-dot.action { background: var(--action); }
  .card-dot.script { background: var(--script); }
  .card-dot.response { background: var(--response); }
  .card-dot.tip { background: var(--tip); }
  .card-dot.check { background: var(--check); }
  .card-dot.label { background: var(--gold); }

  .card-tag { font-size: 0.6em; font-weight: 600; text-transform: uppercase; letter-spacing: 0.8px; padding: 2px 6px; border-radius: 3px; flex-shrink: 0; margin-top: 2px; }
  .card-tag.action { background: #e8f5e9; color: var(--action); }
  .card-tag.script { background: #e3f2fd; color: var(--script); }
  .card-tag.response { background: #f3e5f5; color: var(--response); }
  .card-tag.tip { background: #fff3e0; color: var(--tip); }
  .card-tag.check { background: #e0f2f1; color: var(--check); }
  .card-tag.label { background: #fff8e1; color: #f57f17; }

  .card-text { flex: 1; font-size: 0.88em; line-height: 1.55; color: var(--text); }
  .card-anchor { flex: 1; font-size: 0.95em; line-height: 1.4; color: var(--text); font-weight: 500; }
  .card-expander { font-size: 0.75em; color: var(--text-light); flex-shrink: 0; margin-top: 2px; transition: color 0.15s; user-select: none; }
  .card-header:hover .card-expander { color: var(--navy); }
  .card-full { display: none; padding: 8px 12px 12px 30px; font-size: 0.85em; line-height: 1.6; color: var(--text-light); border-top: 1px dashed var(--border); margin: 0 12px 0 30px; padding-left: 0; padding-right: 0; }
  .card-full.open { display: block; }

  .card-note-toggle { font-size: 0.68em; color: var(--text-light); border: 1px solid var(--border); padding: 3px 8px; border-radius: 4px; cursor: pointer; white-space: nowrap; flex-shrink: 0; transition: all 0.15s; margin-top: 1px; }
  .card-note-toggle:hover { border-color: var(--navy); color: var(--navy); }
  .card-note-toggle.has-note { border-color: var(--gold); color: #b8860b; background: #fffcf0; }

  .card-note { padding: 0 12px 10px 30px; display: none; }
  .card-note textarea { width: 100%; border: 1px solid var(--border); border-radius: 6px; padding: 8px 10px; font-family: 'DM Sans', sans-serif; font-size: 0.85em; resize: vertical; min-height: 48px; outline: none; color: var(--text); }
  .card-note textarea:focus { border-color: var(--navy); }
  .card-note-info textarea   { border-left: 3px solid #c8a45a; }
  .card-note-worko textarea  { border-left: 3px solid #2e7d32; }
  /* Discovery inline inputs */
  .disc-input-row { padding: 4px 12px 8px 30px; display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
  .disc-text { border:none; border-bottom:1px solid #c9a84c; background:transparent; font-family:inherit; font-size:12px; color:#1a2744; padding:2px 4px; outline:none; flex:1; min-width:120px; max-width:340px; }
  .disc-text:focus { border-bottom-color:#1a2744; }
  .disc-cb-wrap { display:flex; align-items:center; gap:5px; font-size:12px; color:#555; }
  .disc-cb-wrap input[type=checkbox] { accent-color:#1a2744; width:14px; height:14px; cursor:pointer; }
  .disc-rb-wrap { display:flex; align-items:center; gap:5px; font-size:12px; color:#555; cursor:pointer; }
  .disc-rb-wrap input[type=radio] { accent-color:#1a2744; width:13px; height:13px; cursor:pointer; }
  .disc-rank-btn { display:inline-flex; align-items:center; gap:5px; padding:3px 10px; border:1px solid #ddd; border-radius:5px; background:#f5f0e6; font-size:12px; font-weight:600; cursor:pointer; user-select:none; transition:all 0.15s; }
  .disc-rank-btn:hover { border-color:#c9a84c; background:#f0e6cc; }
  .disc-rank-btn.ranked { background:#1a2744; color:#fff; border-color:#1a2744; }
  .disc-rank-num { display:inline-flex; align-items:center; justify-content:center; width:16px; height:16px; border-radius:50%; background:#c9a84c; color:#1a2744; font-size:10px; font-weight:700; }
  .disc-else-inp { border:none; border-bottom:1px solid #c9a84c; background:transparent; font-size:12px; font-family:inherit; width:80px; padding:1px 3px; outline:none; }
  .card-note-workr textarea  { border-left: 3px solid #1565c0; }
  .card-note-seller textarea { border-left: 3px solid #6a1b9a; }
  .card-note-toggle.bucket-info.has-note   { border-color: #c8a45a; color: #8a6d2a; background: #fffcf0; }
  .card-note-toggle.bucket-worko.has-note  { border-color: #2e7d32; color: #2e7d32; background: #f1f8f2; }
  .card-note-toggle.bucket-workr.has-note  { border-color: #1565c0; color: #1565c0; background: #f0f6fc; }
  .card-note-toggle.bucket-seller.has-note { border-color: #6a1b9a; color: #6a1b9a; background: #f9f3fc; }

  .sub-card { margin-left: 24px; border-left: 2px solid var(--border); }

  /* ══════════════════════════════════════════
     FIELD ITEMS
     ══════════════════════════════════════════ */
  .field-card { background: #fffcf0; border: 1px solid var(--gold-light); border-radius: 8px; padding: 10px 14px; margin-bottom: 8px; display: flex; align-items: center; gap: 12px; box-shadow: 0 1px 4px rgba(200,164,90,0.1); }
  .field-card label { font-size: 0.72em; font-weight: 700; text-transform: uppercase; letter-spacing: 0.6px; color: #b8860b; flex-shrink: 0; min-width: 90px; }
  .field-card input, .field-card select { flex: 1; border: none; border-bottom: 1px solid var(--gold-light); background: transparent; padding: 5px 2px; font-family: 'DM Sans', sans-serif; font-size: 0.92em; color: var(--text); outline: none; }
  .field-card input:focus, .field-card select:focus { border-bottom-color: var(--navy); }
  .field-card select { cursor: pointer; }
  @media (max-width: 430px) {
    .field-card { padding: 8px 10px; gap: 8px; }
    .field-card label { font-size: 0.65em; min-width: 72px; }
    .field-card input, .field-card select { font-size: 0.85em; }
  }

  /* ══════════════════════════════════════════
     TOOLBAR
     ══════════════════════════════════════════ */
  .toolbar { position: fixed; bottom: 0; left: 0; right: 0; background: var(--navy); padding: 10px 16px; display: flex; gap: 8px; justify-content: center; align-items: center; z-index: 100; }
  .toolbar button { font-family: 'DM Sans', sans-serif; font-size: 0.8em; font-weight: 600; padding: 8px 18px; border: none; border-radius: 5px; cursor: pointer; transition: all 0.15s; }
  .btn-save { background: var(--gold); color: var(--navy); }
  .btn-save:hover { background: #d4b06a; }
  .btn-load { background: rgba(255,255,255,0.15); color: #fff; }
  .btn-load:hover { background: rgba(255,255,255,0.25); }
  .btn-reset { background: rgba(220,53,69,0.85); color: #fff; }
  .btn-reset:hover { background: #dc3545; }
  .btn-export { background: rgba(255,255,255,0.15); color: #fff; }
  .btn-export:hover { background: rgba(255,255,255,0.25); }
  .save-ind { font-size: 0.75em; color: var(--gold-light); }

  /* ══════════════════════════════════════════
     TOAST
     ══════════════════════════════════════════ */
  .toast { position: fixed; bottom: 70px; left: 50%; transform: translateX(-50%); background: #333; color: #fff; padding: 8px 24px; border-radius: 6px; font-size: 0.85em; opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 200; }
  .toast.show { opacity: 1; }

  /* ══════════════════════════════════════════
     IPHONE PRO MAX  (≤ 430px)
     ══════════════════════════════════════════ */
  @media (max-width: 430px) {
    .header { padding: 12px 12px 0; }
    .header-top { flex-direction: column; align-items: stretch; gap: 8px; }
    .header h1 { font-size: 1.1em; }
    .header-meta { gap: 6px; }
    .header-meta input.addr { flex: 1; width: auto; min-width: 0; }
    .header-meta input.dt { width: 100px; }

    .tab-bar { flex-wrap: nowrap; overflow-x: visible; gap: 2px; }
    .tab-btn { font-size: 0.68em; padding: 7px 4px; flex: 1 1 0; min-width: 0; text-align: center; line-height: 1.25; white-space: normal; border-radius: 6px 6px 0 0; min-height: 42px; }
    .tab-btn .tab-num, .tab-btn .tab-name { display: block; }
    .tab-btn .tab-num { font-size: 1em; }
    .tab-btn .tab-name { font-size: 1em; }
    .tab-btn .tab-full { display: none; }

    .content { padding: 0 10px 72px; }
    .section-title { font-size: 1em; margin: 16px 0 8px; }

    .card-header { padding: 10px; gap: 6px; }
    .card-text { font-size: 0.84em; line-height: 1.5; }
    .card-anchor { font-size: 0.9em; line-height: 1.35; }
    .card-full { padding: 0 10px 10px 26px; font-size: 0.82em; }
    .card-full.open { margin: 0 10px 0 26px; }
    .card-tag { font-size: 0.55em; padding: 2px 5px; }
    .card-note { padding: 0 10px 10px 26px; }
    .card-note textarea { min-height: 44px; font-size: 0.82em; }

    .toolbar { padding: 8px 10px; gap: 6px; }
    .toolbar button { padding: 8px 14px; font-size: 0.75em; }
    .toast { bottom: 62px; font-size: 0.8em; }

    /* Safe area for phones with home indicator */
    .toolbar { padding-bottom: max(10px, env(safe-area-inset-bottom)); }
    .content { padding-bottom: calc(72px + env(safe-area-inset-bottom)); }
  }

  /* ══════════════════════════════════════════
     TABLET — iPad Pro 13" landscape (≥ 1024px)
     ══════════════════════════════════════════ */
  @media (min-width: 1024px) {
    .header { padding: 16px 32px 0; }
    .header-top { gap: 20px; }
    .header h1 { font-size: 1.4em; }
    .header-meta input { font-size: 0.85em; padding: 7px 12px; }
    .header-meta input.addr { width: 220px; }
    .header-meta input.dt { width: 120px; }

    .tab-btn { font-size: 0.82em; padding: 11px 22px; }

    .content { max-width: 960px; padding: 0 32px 80px; }
    .tab-panel { padding-top: 24px; }
    .section-title { font-size: 1.2em; margin: 28px 0 14px; }

    .card { margin-bottom: 10px; }
    .card-header { padding: 12px 18px; gap: 10px; }
    .card-text { font-size: 0.92em; line-height: 1.6; }
    .card-anchor { font-size: 1em; line-height: 1.45; }
    .card-full { padding: 0 18px 12px 40px; font-size: 0.9em; }
    .card-full.open { margin: 0 18px 0 40px; }
    .card-tag { font-size: 0.65em; }
    .card-note { padding: 0 18px 12px 40px; }
    .card-note textarea { min-height: 56px; font-size: 0.88em; }

    .toolbar button { padding: 9px 24px; font-size: 0.85em; }
  }

  /* ══════════════════════════════════════════
     DESKTOP (≥ 1400px)
     ══════════════════════════════════════════ */
  @media (min-width: 1400px) {
    .header { padding: 18px 48px 0; }
    .header h1 { font-size: 1.5em; }
    .header-meta input.addr { width: 260px; }

    .content { max-width: 1060px; padding: 0 48px 80px; }
    .section-title { font-size: 1.25em; }

    .card-header { padding: 14px 20px; }
    .card-text { font-size: 0.95em; }
    .card-anchor { font-size: 1.05em; }
    .card-note textarea { min-height: 60px; }
  }

  /* ══════════════════════════════════════════
     PRINT
     ══════════════════════════════════════════ */
  @media print {
    body { background: #fff; }
    .header { position: static; }
    .toolbar { display: none !important; }
    .tab-panel { display: block !important; page-break-before: always; }
    .tab-panel:first-child { page-break-before: auto; }
    .card-note { display: block !important; }
    .card-full { display: block !important; padding: 4px 12px 10px 30px !important; }
    .card-expander { display: none !important; }
  }
/* ── Tab 1.5 sub-tab bar ── */
.subtab-bar{display:none;background:#eef3f8;border-bottom:1px solid var(--line,#e2e0da);padding:6px 8px;gap:6px;flex-wrap:wrap;position:sticky;top:var(--tabbar-h,96px);z-index:40}
.subtab-bar.show{display:flex}
.subtab-btn{background:#fff;border:1px solid #d4d1c9;color:#1a3a5c;font-family:inherit;font-size:.78em;font-weight:600;padding:5px 10px;border-radius:14px;cursor:pointer}
.subtab-btn.active{background:#1a3a5c;color:#fff;border-color:#1a3a5c}
.subtab-btn.bridge{border-color:#6a1b9a;color:#6a1b9a}
.subtab-btn.bridge.active{background:#6a1b9a;color:#fff}
.sub-panel{display:none}.sub-panel.active{display:block}
/* Fork interactive (Entry sub-tab) */
.fork-scale{background:#fff;border-radius:10px;padding:18px;margin-bottom:14px;box-shadow:0 1px 4px rgba(0,0,0,.06);border-top:4px solid #c8a45a}
.fork-scale h3{font-family:'Playfair Display',serif;color:#1a3a5c;font-size:1.05em;margin-bottom:10px}
.fork-scale blockquote{background:#eef3f8;border-left:3px solid #1565c0;padding:10px 12px;font-size:.9em;color:#1a3a5c;border-radius:0 6px 6px 0}
.route-btns{display:grid;grid-template-columns:1fr;gap:10px;margin-top:14px}
@media(min-width:640px){.route-btns{grid-template-columns:1fr 1fr 1fr}}
.route-btn{background:#fff;border:2px solid #e2e0da;border-radius:8px;padding:12px 14px;cursor:pointer;text-align:left;font-family:inherit}
.route-btn .t{font-weight:600;color:#1a3a5c;margin-bottom:3px}
.route-btn .s{font-size:.8em;color:#666;line-height:1.4}
.route-btn.primary{border-color:#2f7d52;background:#f1f8f2}
.route-btn.mid{border-color:#e65100}
.route-btn.split{border-color:#6a1b9a;background:#f9f3fc}
.sig-block{background:#fff;border-radius:10px;padding:16px;margin-bottom:14px;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.sig-block .q{font-style:italic;color:#254d75;background:#eef3f8;border-left:3px solid #1565c0;padding:10px 12px;font-size:.88em;border-radius:0 6px 6px 0;margin-bottom:12px}
.sig-group{margin-bottom:12px;padding:10px;border-radius:8px;border:1px solid #e2e0da}
.sig-group.a{border-left:4px solid #2e7d32}.sig-group.b{border-left:4px solid #1565c0}.sig-group.c{border-left:4px solid #e65100}.sig-group.d{border-left:4px solid #6a1b9a}.sig-group.e{border-left:4px solid #00695c}
.sig-group h4{font-family:'Playfair Display',serif;font-size:.92em;color:#1a3a5c;margin-bottom:6px;display:flex;justify-content:space-between;align-items:baseline}
.sig-group h4 .pill{font-family:'DM Sans',sans-serif;font-size:.65em;font-weight:600;padding:2px 7px;border-radius:10px;color:#fff}
.sig-group.a .pill{background:#2e7d32}.sig-group.b .pill{background:#1565c0}.sig-group.c .pill{background:#e65100}.sig-group.d .pill{background:#6a1b9a}.sig-group.e .pill{background:#00695c}
.sig-opt{display:block;padding:5px 3px;font-size:.86em;line-height:1.4;cursor:pointer;border-radius:4px}
.sig-opt input{margin-right:8px}.sig-opt.checked{background:#fffcf0}
.route-status{background:#1a3a5c;color:#fff;padding:10px 12px;border-radius:6px;margin-bottom:12px;font-size:.85em;display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap}
.route-status .label{color:#e8d5a0;font-weight:600}
.route-status .go{background:#c8a45a;color:#1a3a5c;border:none;padding:7px 12px;border-radius:4px;font-weight:600;font-family:inherit;cursor:pointer;font-size:.85em}
.route-status .go:disabled{background:#555;color:#999;cursor:not-allowed}
.bridge-card{background:#fff;border-radius:10px;padding:18px;margin-bottom:14px;box-shadow:0 1px 4px rgba(0,0,0,.06);border-top:4px solid #6a1b9a}
.bridge-card h3{font-family:'Playfair Display',serif;color:#1a3a5c;font-size:1.05em;margin-bottom:10px}
.bridge-card .skipped{background:#f9f3fc;border-left:3px solid #6a1b9a;padding:10px 12px;font-size:.85em;margin-bottom:10px;border-radius:0 6px 6px 0}
.bridge-card .ack{background:#eef3f8;border-left:3px solid #1565c0;padding:10px 12px;font-size:.9em;color:#254d75;border-radius:0 6px 6px 0;margin-bottom:12px;font-style:italic}
.bridge-btns{display:flex;gap:8px;flex-wrap:wrap}
.bridge-btns button{flex:1;min-width:160px;padding:9px 12px;border:none;border-radius:6px;font-family:inherit;font-weight:600;cursor:pointer;font-size:.88em}
.bridge-btns .go{background:#c8a45a;color:#1a3a5c}
.bridge-btns .flip{background:transparent;color:#1a3a5c;border:1px solid #e2e0da}
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <h1>Listing Presentation Companion</h1>
    <div class="header-meta">
      <input type="text" class="addr" id="field-address" placeholder="Property address">
      <input type="text" class="dt" id="field-date" placeholder="yyyy-mm-dd">
      <input type="text" class="addr" id="field-client" placeholder="Client name(s)">
    </div>
  </div>
  <div class="tab-bar" id="tabBar"></div>
  <div class="subtab-bar" id="subtabBar15"></div>
</div>

<div class="content" id="content"></div>

<div class="toolbar">
  <button class="btn-save" onclick="saveData()">Save</button>
  <button class="btn-load" onclick="loadList()">Load</button>
  <button class="btn-reset" onclick="resetAll()">Reset</button>
  <button class="btn-export" onclick="exportData()">Export</button>
  <button class="btn-export" onclick="exportBucket('info')" title="Features, facts, neighborhood">⬇ Info</button>
  <button class="btn-export" onclick="exportBucket('work')" title="Prep plan, repairs, staging">⬇ Work</button>
  <button class="btn-export" onclick="exportBucket('seller')" title="Motivation, readiness, tone">⬇ Seller</button>
  <span class="save-ind" id="saveInd"></span>
</div>

<div class="toast" id="toast"></div>

<script>
// ═══════════════════════════════════════════════════════════
// SCRIPT DATA
// ═══════════════════════════════════════════════════════════

        { type:"script", anchor:"clear customized plan", text:"Jane, Mike… Before we dive in, I promise: By the time we finish today, you'll have a clear, customized plan to get your home sold for the absolute maximum the market will pay — with minimal stress." },

        { type:"response", anchor:"positive", text:"If Positive (Upsizing/Relocation/New chapter): \"That's exciting! What are you looking forward to most about this change? My job is to make this easy so you can focus on what's next.\"" },

        { type:"script", anchor:"last time sold", text:"To help me tailor this process — when was the last time you sold a home?" },
        { type:"response", anchor:"recent", text:"If recent (1–5 years): \"How was that experience? What worked well, and what was missing that you really need this time?\"" },
        { type:"response", anchor:"long ago", text:"If long ago (10+ years): \"A lot has changed since then — especially with technology and buyer behavior. I'll guide you through every step so nothing catches you off guard.\"" },
        { type:"response", anchor:"first time", text:"If first time: \"That's exciting — you're in good hands. I'll walk you through every step so you never feel lost or unsure.\"" },

// IndexedDB
// ═══════════════════════════════════════════════════════════
const DB_NAME = 'LPScriptDB', DB_VER = 1, STORE = 'records';
let db = null;

function openDB() {
  return new Promise((res, rej) => {
    const r = indexedDB.open(DB_NAME, DB_VER);
    r.onupgradeneeded = e => {
      const d = e.target.result;
      if (!d.objectStoreNames.contains(STORE))
        d.createObjectStore(STORE, { keyPath: 'id', autoIncrement: true });
    };
    r.onsuccess = e => { db = e.target.result; res(db); };
    r.onerror = e => rej(e.target.error);
  });
}
const dbOp = (mode, fn) => new Promise((res, rej) => {
  const tx = db.transaction(STORE, mode);
  const req = fn(tx.objectStore(STORE));
  req.onsuccess = () => res(req.result);
  req.onerror = () => rej(req.error);
});
const dbAdd = r => dbOp('readwrite', s => s.add(r));
const dbPut = r => dbOp('readwrite', s => s.put(r));
const dbGetAll = () => dbOp('readonly', s => s.getAll());
const dbDel = id => dbOp('readwrite', s => s.delete(id));

              btn.appendChild(document.createTextNode(opt));
              btn.addEventListener('click', () => discRankClick(fld, opt));
              row.appendChild(btn);
            });
          }

          targetParent.appendChild(row);
          return;
        }

        const card = document.createElement('div');
        card.className = 'card';

        const header = document.createElement('div');
        header.className = 'card-header';

        const dot = document.createElement('span');
        dot.className = 'card-dot ' + item.type;
        header.appendChild(dot);

        const typeLabels = { action:'DO', script:'SAY', response:'IF/THEN', tip:'TIP', check:'CHECK-IN', label:'—' };
        const tag = document.createElement('span');
        tag.className = 'card-tag ' + item.type;
        tag.textContent = typeLabels[item.type] || '';
        header.appendChild(tag);

        const anchor = document.createElement('span');
        anchor.className = 'card-anchor';
        anchor.textContent = item.anchor || item.text || '';
        header.appendChild(anchor);

        const hasFullText = item.text && item.text !== item.anchor;
        if (hasFullText) {
          const expander = document.createElement('span');
          expander.className = 'card-expander';
          expander.textContent = '▸';
          expander.id = 'ex_' + uid;
          header.appendChild(expander);
          header.onclick = (e) => {
            if (e.target.classList.contains('card-note-toggle')) return;
            toggleFull(uid);
          };
          header.style.cursor = 'pointer';
        }

        // For Tab 1 walk-through cards, render four bucketed note buttons (Info/WorkO/WorkR/Seller).
        // For other tabs, fall back to the original single +Note button.
        if (item.type !== 'label') {
          if (ti === 0) {
            ['info','worko','workr','seller'].forEach(bucket => {
              const key = uid + '_' + bucket;
              const b = document.createElement('span');
              b.className = 'card-note-toggle bucket-' + bucket;
              b.textContent = noteLabelFor(bucket, false);
              b.id = 'nb_' + key;
              b.onclick = (e) => { e.stopPropagation(); toggleNote(key); };
              header.appendChild(b);
            });
          } else {
            const noteBtn = document.createElement('span');
            noteBtn.className = 'card-note-toggle';
            noteBtn.textContent = '+Note';
            noteBtn.id = 'nb_' + uid;
            noteBtn.onclick = (e) => { e.stopPropagation(); toggleNote(uid); };
            header.appendChild(noteBtn);
          }
        }

        card.appendChild(header);

        if (hasFullText) {
          const fullDiv = document.createElement('div');
          fullDiv.className = 'card-full';
          fullDiv.id = 'fd_' + uid;
          fullDiv.dataset.template = item.text;
          fullDiv.textContent = item.text;
          card.appendChild(fullDiv);
        }

        if (item.type !== 'label') {
          if (ti === 0) {
            ['info','worko','workr','seller'].forEach(bucket => {
              const key = uid + '_' + bucket;
              const nd = document.createElement('div');
              nd.className = 'card-note card-note-' + bucket;
              nd.id = 'nd_' + key;
              const ta = document.createElement('textarea');
              ta.id = 'nt_' + key;
              ta.placeholder = ({
                info:  'Features, facts, neighborhood…',
                worko: 'Owner to-do (repair, declutter, cooperate)…',
                workr: 'Realtor to-do (coordinate, market, manage)…',
                seller:'Motivation, tone, read…'
              })[bucket];
              ta.oninput = () => onNoteInput(key);
              nd.appendChild(ta);
              card.appendChild(nd);
            });
          } else {
            const noteDiv = document.createElement('div');
            noteDiv.className = 'card-note';
            noteDiv.id = 'nd_' + uid;
            const ta = document.createElement('textarea');
            ta.id = 'nt_' + uid;
            ta.placeholder = 'Your notes...';
            ta.oninput = () => onNoteInput(uid);
            noteDiv.appendChild(ta);
            card.appendChild(noteDiv);
          }
        }

        targetParent.appendChild(card);
      });
    });

    if (ti === 1) {
      const bp = document.createElement('div');
      bp.className = 'sub-panel';
      bp.id = 'subpanel-bridge';
      bp.innerHTML = FORK_BRIDGE_HTML();
      panel.appendChild(bp);
    }

    content.appendChild(panel);
  });

  // Inject live playback summary box after the playback summary card in tab 1 (Discovery)
  const playbackCard = Array.from(document.querySelectorAll('.card-anchor'))
    .find(el => el.textContent.trim() === 'playback summary');
  if (playbackCard) {
    const parentCard = playbackCard.closest('.card');
    if (parentCard && !document.getElementById('disc_playback_wrap')) {
      const wrap = document.createElement('div');
      wrap.id = 'disc_playback_wrap';
      wrap.style.cssText = 'margin:4px 0 8px 0;padding:10px 14px;background:#f5f0e6;border-left:3px solid #c9a84c;border-radius:0 6px 6px 0;font-size:12.5px;line-height:1.75;color:#1a2744;';
      const pb = document.createElement('div');
      pb.id = 'disc_playback';
      pb.style.color = '#555';
      pb.textContent = 'Fill in the discovery fields above to see the playback summary here.';
      wrap.appendChild(pb);
      parentCard.after(wrap);
    }
  }
}

function switchTab(idx) {

// ═══ Tab 1.5 Motivation Fallback Fork ═══
const PATH_NAMES = { a:'Path A · Informational', b:'Path B · Relational', c:'Path C · Circumstantial', d:'Path D · Spousal Split', e:'Path E · Exploratory', default:'Default · Both 8–10' };
const ORDER = { a:1, c:2, b:3, d:4 }; // larger-blocker rule
const fork15 = { activeSub: null, chosen: null, secondary: null };

function sigGroup(k, icon, pill, opts) {

}
function FORK_BRIDGE_HTML() {

// Map path key → sub-panel id suffix (section index)
const PATH_TO_SUB = { default:'1', a:'2', b:'3', c:'4', d:'5', e:'6' };
const SUB_TO_PATH = { '1':'default','2':'a','3':'b','4':'c','5':'d','6':'e' };

function renderSubtabBar() {
  const sb = document.getElementById('subtabBar15');
  sb.innerHTML = '';
  const items = [
    { key:'entry', label:'Entry' },
    { key:'bridge', label:'Bridge', cls:'bridge', conditional:true },
    { key:'default', label:'Default' },
    { key:'a', label:'Path A' }, { key:'b', label:'Path B' }, { key:'c', label:'Path C' },
    { key:'d', label:'Path D' }, { key:'e', label:'Path E' }
  ];
  items.forEach(it => {
    if (it.conditional && !fork15.secondary) return; // Bridge only if split
    const b = document.createElement('button');
    b.className = 'subtab-btn' + (it.cls ? ' '+it.cls : '') + (fork15.activeSub === it.key ? ' active' : '');
    b.textContent = it.label;
    b.onclick = () => { fork15.activeSub = it.key; document.getElementById('subtabBar15').classList.add('show'); renderSubtabBar(); showSubPanel(it.key); save15(); };
    sb.appendChild(b);
  });
}
function getCheckedTextsByPath() {
  const out = {};
  document.querySelectorAll('#subpanel-0 .sig-opt input:checked').forEach(cb => {
    const p = cb.dataset.p;
    const t = cb.parentElement.textContent.trim();
    (out[p] = out[p] || []).push(t);
  });
  return out;
}
function quoteFor(pathKey) {
  const texts = (getCheckedTextsByPath()[pathKey]) || [];
  if (!texts.length) return null;
  if (texts.length === 1) return texts[0].replace(/^["']|["']$/g,'');
  // Join up to 2 quotes naturally
  const a = texts[0], b = texts[1];
  return a + ' — and also that ' + b.charAt(0).toLowerCase() + b.slice(1);
}
function refreshBridgeContent() {
  if (!fork15.chosen || !fork15.secondary) return;
  const pn = document.getElementById('primaryPathName');
  const pb = document.getElementById('primaryBtnName');
  const sb = document.getElementById('secondaryBtnName');
  const ack = document.getElementById('ackScript');
  if (!pn || !pb || !sb || !ack) return;
  pn.textContent = PATH_NAMES[fork15.secondary];
  pb.textContent = PATH_NAMES[fork15.chosen].split(' · ')[0];
  sb.textContent = PATH_NAMES[fork15.secondary].split(' · ')[0];
  const SLABEL = { a:'the information piece', b:'the trust piece', c:'the timing piece', d:'the readiness split', e:'the exploratory piece' };
  const secQuote = quoteFor(fork15.secondary);
  const priQuote = quoteFor(fork15.chosen);
  const secPhrase = secQuote ? ('that "' + secQuote.replace(/"/g,'') + '"') : SLABEL[fork15.secondary] || 'that concern';
  const priPhrase = priQuote ? ('what you said about "' + priQuote.replace(/"/g,'') + '"') : SLABEL[fork15.chosen] || 'the bigger piece';
  ack.innerHTML = 'Before I dive in — I heard you mention <strong>'+secPhrase+'</strong>, and I want you to know I haven\'t forgotten that. We\'ll come back to it. But let me first address <strong>'+priPhrase+'</strong>, because if we don\'t resolve that first, the rest doesn\'t really matter. Is that okay with you?';
}
function showSubPanel(key) {
  document.querySelectorAll('#panel-1 .sub-panel').forEach(p => p.classList.remove('active'));
  let id;
  if (key === 'entry') id = 'subpanel-0';
  else if (key === 'bridge') id = 'subpanel-bridge';
  else id = 'subpanel-' + PATH_TO_SUB[key];
  const el = document.getElementById(id);
  if (el) el.classList.add('active');
  if (key === 'bridge') refreshBridgeContent();
  window.scrollTo({top:0, behavior:'instant'});
}
function forkGo(pathKey) {
  fork15.chosen = pathKey; fork15.secondary = null; fork15.activeSub = pathKey;
  document.getElementById('subtabBar15').classList.add('show');
  renderSubtabBar(); showSubPanel(pathKey); save15();
}
function forkGoSignals() {
  const fs = document.getElementById('forkSignals');
  if (fs) fs.style.display = 'block';
  forkRecompute();
}
function forkRecompute() {
  const checked = {};
  document.querySelectorAll('#subpanel-0 .sig-opt input').forEach(cb => {
    cb.parentElement.classList.toggle('checked', cb.checked);
    if (cb.checked) checked[cb.dataset.p] = (checked[cb.dataset.p]||0)+1;
  });
  const paths = Object.keys(checked);
  const status = document.getElementById('routeText');
  const btn = document.getElementById('openPath');
  if (!status || !btn) return;
  if (paths.length === 0) { status.textContent='— (check what they said)'; btn.disabled=true; fork15.chosen=null; fork15.secondary=null; return; }
  if (paths.includes('d')) {
    const others = paths.filter(p => p!=='d');
    fork15.chosen = 'd';
    fork15.secondary = others.length ? others.sort((a,b)=>(ORDER[b]||0)-(ORDER[a]||0))[0] : null;
    status.innerHTML = fork15.secondary ? 'Split revealed → <strong>Path D</strong> first, then '+PATH_NAMES[fork15.secondary] : 'Split revealed → <strong>Path D</strong>';
    btn.disabled=false; btn.textContent = fork15.secondary ? 'Review bridge →' : 'Open Path D →'; return;
  }
  if (paths.includes('e') && paths.length > 1) {
    fork15.chosen='e'; fork15.secondary=null;
    status.innerHTML = 'Exploratory signals → <strong>Path E</strong>'; btn.disabled=false; btn.textContent='Open Path E →'; return;
  }
  if (paths.length === 1) {
    fork15.chosen = paths[0]; fork15.secondary=null;
    status.innerHTML = 'Single path → <strong>'+PATH_NAMES[fork15.chosen]+'</strong>'; btn.disabled=false;
    btn.textContent = 'Open '+PATH_NAMES[fork15.chosen].split(' · ')[0]+' →'; return;
  }
  paths.sort((a,b)=>(ORDER[b]||0)-(ORDER[a]||0));
  fork15.chosen = paths[0]; fork15.secondary = paths[1];
  status.innerHTML = 'Blocker-split → primary <strong>'+PATH_NAMES[fork15.chosen]+'</strong>, skipped '+PATH_NAMES[fork15.secondary];
  btn.disabled=false; btn.textContent='Review bridge →';
}
function forkOpenChosen() {
  if (!fork15.chosen) return;
  if (fork15.secondary) {
    document.getElementById('primaryPathName').textContent = PATH_NAMES[fork15.chosen];
    document.getElementById('primaryBtnName').textContent = PATH_NAMES[fork15.chosen].split(' · ')[0];
    document.getElementById('secondaryBtnName').textContent = PATH_NAMES[fork15.secondary].split(' · ')[0];
    const SLABEL = { a:'the information piece', b:'the trust piece', c:'the timing piece', d:'the readiness split', e:'the exploratory piece' };
    const sLabel = SLABEL[fork15.secondary] || 'that concern';
    document.getElementById('ackScript').innerHTML = 'Before I dive in — I heard you mention <strong>'+sLabel+'</strong>, and I want you to know I haven\'t forgotten that. We\'ll come back to it. But let me first address the bigger piece, because if we don\'t resolve that first, the rest doesn\'t really matter. Is that okay with you?';
    fork15.activeSub = 'bridge';
    document.getElementById('subtabBar15').classList.add('show');
    renderSubtabBar(); showSubPanel('bridge'); save15();
  } else {
    forkGo(fork15.chosen);
  }
}
function forkOpenPrimary() { forkGo(fork15.chosen); }
function forkOpenSecondary() { const t = fork15.secondary; fork15.secondary = fork15.chosen; fork15.chosen = t; forkOpenChosen(); }

function save15() { if (currentId) saveData(); }

function toggleNote(uid) {
  const nd = document.getElementById('nd_' + uid);
  const showing = nd.style.display === 'block';
  nd.style.display = showing ? 'none' : 'block';
  if (!showing) document.getElementById('nt_' + uid).focus();
}

function toggleFull(uid) {
  const fd = document.getElementById('fd_' + uid);
  const ex = document.getElementById('ex_' + uid);
  if (!fd) return;
  const showing = fd.classList.contains('open');
  fd.classList.toggle('open', !showing);

// ── Discovery rank/radio helpers ──────────────────────────────────────────
window._discRank = {};

function discRankClick(fld, opt) {
  if (!window._discRank[fld]) window._discRank[fld] = [];
  const order = window._discRank[fld];
  const idx = order.indexOf(opt);
  if (idx >= 0) {
    order.splice(idx, 1);
  } else if (order.length < 3) {
    order.push(opt);
  }
  // re-render badges
  const opts = ['Price','Timing','Low Stress'];
  opts.forEach(o => {
    const btn = document.getElementById('rankbtn_' + fld + '_' + o);
    const num = document.getElementById('ranknum_' + fld + '_' + o);
    if (!btn || !num) return;
    const pos = order.indexOf(o);
    if (pos >= 0) {
      btn.classList.add('ranked');
      num.textContent = pos + 1;
    } else {
      btn.classList.remove('ranked');
      num.textContent = '?';
    }
  });
  updatePlayback();
}

function getDiscValues() {
  const v = {};
  // text fields
  document.querySelectorAll('.disc-text').forEach(el => {
    if (el.dataset.field) v[el.dataset.field] = el.value.trim();
  });
  // checkboxes
  document.querySelectorAll('.disc-cb-wrap input[type=checkbox]').forEach(el => {
    if (el.dataset.field) v[el.dataset.field] = el.checked ? 'Yes' : '';
  });
  // radios
  document.querySelectorAll('.disc-rb-wrap input[type=radio]:checked').forEach(el => {
    if (el.dataset.field) {
      let val = el.value;
      if (val === 'Else') {
        const elseInp = document.getElementById('disc_' + el.dataset.field + '_else');
        val = (elseInp && elseInp.value.trim()) ? elseInp.value.trim() : 'Else';
      }
      v[el.dataset.field] = val;
    }
  });
  // rank
  if (window._discRank) {
    Object.entries(window._discRank).forEach(([fld, order]) => {
      v[fld] = order.map((o,i) => (i+1)+'. '+o).join(', ');
    });
  }
  return v;
}

function updatePlayback() {
  const el = document.getElementById('disc_playback');
  if (!el) return;
  const v = getDiscValues();
  const f = k => v[k] || '___';
  el.innerHTML =
    'It sounds like the main reason you\'re selling is <strong>' + f('dc_f1') + '</strong>, ' +
    'you\'re hoping to <strong>' + f('dc_f2') + '</strong>, ' +
    'ideally around <strong>' + f('dc_f3') + '</strong>. ' +
    'Your top priorities are <strong>' + f('dc_f4') + '</strong>, ' +
    'and you want to make sure <strong>' + f('dc_f5') + '</strong> are handled well. ' +
    'You want to be communicated by <strong>' + f('dc_f6') + ' ' + f('dc_f7') + '</strong>. ' +
    'You\'re looking for an agent who <strong>' + f('dc_f8') + '</strong>.';
}

function refreshTemplates() {
  const values = {};
  document.querySelectorAll('[data-field]').forEach(el => {
    values[el.dataset.field] = el.value.trim();
  });
  document.querySelectorAll('[data-template]').forEach(div => {
    let text = div.dataset.template;
    // {{field}} for standard fields
    text = text.replace(/\{\{(\w+)\}\}/g, (match, key) => {
      return values[key] || '_____';
    });
    // {field} for disc fields
    const dv = (typeof getDiscValues === 'function') ? getDiscValues() : {};
    text = text.replace(/\{(\w+)\}/g, (match, key) => {
      return dv[key] || values[key] || '___';
    });
    div.textContent = text;
  });
  if (typeof updatePlayback === 'function') updatePlayback();
}

function onNoteInput(uid) {
  const ta = document.getElementById('nt_' + uid);
  const btn = document.getElementById('nb_' + uid);
  if (!ta || !btn) return;
  if (ta.value.trim()) { btn.classList.add('has-note'); btn.textContent = noteLabel(uid, true); }
  else { btn.classList.remove('has-note'); btn.textContent = noteLabel(uid, false); }
}

// Data collection

function collectData() {
  const notes = {};
  document.querySelectorAll('.card-note textarea').forEach(ta => {
    if (ta.value.trim()) notes[ta.id.replace('nt_', '')] = ta.value;
  });
  const fields = {};
  document.querySelectorAll('[data-field]').forEach(el => {
    if (el.value.trim()) fields[el.dataset.field] = el.value;
  });
  // disc text fields
  document.querySelectorAll('.disc-text').forEach(el => {
    if (el.dataset.field && el.value.trim()) fields[el.dataset.field] = el.value;
  });
  // disc checkboxes
  document.querySelectorAll('.disc-cb-wrap input[type=checkbox]').forEach(el => {
    if (el.dataset.field) fields[el.dataset.field] = el.checked ? 'yes' : '';
  });
  // disc radios
  document.querySelectorAll('.disc-rb-wrap input[type=radio]:checked').forEach(el => {
    if (el.dataset.field) {
      let val = el.value;
      if (val === 'Else') {
        const ei = document.getElementById('disc_' + el.dataset.field + '_else');
        val = (ei && ei.value.trim()) ? ei.value.trim() : 'Else';
      }
      fields[el.dataset.field] = val;
    }
  });
  // disc else inputs (for freq)
  const elseInp = document.getElementById('disc_dc_f7_else');
  if (elseInp && elseInp.value.trim()) fields['dc_f7_else'] = elseInp.value.trim();
  // rank state
  const discRank = {};
  if (window._discRank) Object.assign(discRank, window._discRank);
  return {
    address: document.getElementById('field-address').value,
    date: document.getElementById('field-date').value,
    client: document.getElementById('field-client').value,
    fields,
    notes,
    discRank
  };
}

function restoreData(d) {
  if (!d) return;
  document.getElementById('field-address').value = d.address || '';
  document.getElementById('field-date').value = d.date || '';
  document.getElementById('field-client').value = d.client || '';
  if (d.fields) {
    Object.entries(d.fields).forEach(([k, v]) => {
      // standard field
      const el = document.querySelector(`[data-field="${k}"]`);
      if (el) el.value = v;
      // disc text
      const dt = document.getElementById('disc_' + k);
      if (dt && dt.classList.contains('disc-text')) dt.value = v;
      // disc checkbox
      if (dt && dt.type === 'checkbox') dt.checked = (v === 'yes');
      // disc radio
      const rb = document.querySelector(`.disc-rb-wrap input[type=radio][data-field="${k}"][value="${v}"]`);
      if (rb) rb.checked = true;
      // disc else text
      if (k === 'dc_f7_else') {
        const ei = document.getElementById('disc_dc_f7_else');
        if (ei) ei.value = v;
      }
    });
    refreshTemplates();
  }
  // restore rank state
  if (d.discRank) {
    window._discRank = JSON.parse(JSON.stringify(d.discRank));
    Object.entries(d.discRank).forEach(([fld, order]) => {
      const opts = ['Price','Timing','Low Stress'];
      opts.forEach(o => {
        const btn = document.getElementById('rankbtn_' + fld + '_' + o);
        const num = document.getElementById('ranknum_' + fld + '_' + o);
        if (!btn || !num) return;
        const pos = order.indexOf(o);
        if (pos >= 0) { btn.classList.add('ranked'); num.textContent = pos + 1; }
        else { btn.classList.remove('ranked'); num.textContent = '?'; }
      });
    });
  }
  if (d.notes) {
    Object.entries(d.notes).forEach(([uid, val]) => {
      const ta = document.getElementById('nt_' + uid);
      if (ta) {
        ta.value = val;
        onNoteInput(uid);
        const nd = document.getElementById('nd_' + uid);
        if (nd) nd.style.display = 'block';
      }
    });
  }

  if (d.fork15) {
    fork15.activeSub = d.fork15.activeSub || null;
    fork15.chosen = d.fork15.chosen || null;
    fork15.secondary = d.fork15.secondary || null;
    if (d.fork15.checks) {
      d.fork15.checks.forEach(c => {
        document.querySelectorAll('#subpanel-0 .sig-opt input[data-p="'+c.p+'"]').forEach(cb => {
          if (cb.parentElement.textContent.trim() === c.text) cb.checked = true;
        });
      });
      if (d.fork15.checks.length) {
        const fs = document.getElementById('forkSignals'); if (fs) fs.style.display = 'block';
        forkRecompute();
      }
    }
    if (fork15.activeSub) {
      renderSubtabBar();
      if (document.querySelectorAll('.tab-btn')[1]?.classList.contains('active')) {
        document.getElementById('subtabBar15').classList.add('show');
        showSubPanel(fork15.activeSub);
      }
    }
  }
}

// ═══════════════════════════════════════════════════════════
// Save / Load / Reset / Export
// ═══════════════════════════════════════════════════════════
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2500);
}

function showInd(msg) {
  const el = document.getElementById('saveInd');
  el.textContent = msg;
  setTimeout(() => el.textContent = '', 3000);
}

async function saveData() {
  const d = collectData();
  d.savedAt = new Date().toISOString();
  if (currentId) { d.id = currentId; await dbPut(d); }
  else { currentId = await dbAdd(d); }
  toast('Saved!');
}

async function loadList() {
  const records = await dbGetAll();
  if (!records.length) { toast('No saved records.'); return; }
  records.sort((a, b) => new Date(b.savedAt) - new Date(a.savedAt));
  const choice = records.map((r, i) => `${i + 1}. ${r.address || 'No address'} — ${r.date || 'No date'} (${r.client || 'No client'})`).join('\n');
  const pick = prompt('Select a record to load:\n\n' + choice + '\n\nEnter number:');
  const idx = parseInt(pick) - 1;
  if (isNaN(idx) || idx < 0 || idx >= records.length) return;
  const rec = records[idx];
  resetFields();
  restoreData(rec);
  currentId = rec.id;
  toast('Loaded: ' + (rec.address || 'record'));
}

function resetFields() {
  document.getElementById('field-address').value = '';
  document.getElementById('field-date').value = new Date().toISOString().slice(0, 10);
  document.getElementById('field-client').value = '';
  document.querySelectorAll('[data-field]').forEach(el => { el.value = ''; });
  // clear disc inputs
  document.querySelectorAll('.disc-text').forEach(el => { el.value = ''; });
  document.querySelectorAll('.disc-else-inp').forEach(el => { el.value = ''; });
  document.querySelectorAll('.disc-cb-wrap input[type=checkbox]').forEach(el => { el.checked = false; });
  document.querySelectorAll('.disc-rb-wrap input[type=radio]').forEach(el => { el.checked = false; });
  // clear rank state and badges
  window._discRank = {};
  ['Price','Timing','Low Stress'].forEach(o => {
    const btn = document.getElementById('rankbtn_dc_f4_' + o);
    const num = document.getElementById('ranknum_dc_f4_' + o);
    if (btn) btn.classList.remove('ranked');
    if (num) num.textContent = '?';
  });
  refreshTemplates();
  updatePlayback();
  document.querySelectorAll('.card-note textarea').forEach(ta => { ta.value = ''; });
  document.querySelectorAll('.card-note-toggle').forEach(btn => { btn.classList.remove('has-note'); btn.textContent = noteLabel(btn.id.replace('nb_',''), false); });
  document.querySelectorAll('.card-note').forEach(nd => { nd.style.display = 'none'; });
}

function resetAll() {
  if (!confirm('Clear all notes and fields?')) return;
  resetFields();
  currentId = null;
  toast('Reset complete.');
}

function getCardByUid(uid) {
  // uid like 't0_s5_i3'
  const m = uid.match(/^t(\d+)_s(\d+)_i(\d+)$/);
  if (!m) return null;
  const [ , ti, si, ii ] = m.map(Number);
  try { return TABS[ti].sections[si].items[ii]; } catch(e) { return null; }
}

// Per-bucket button label (used for Tab 1 four-button cards).
const BUCKET_LABELS = {
  info:   { empty: '+Info',   filled: '★ Info'   },
  worko:  { empty: '+WorkO',  filled: '★ WorkO'  },
  workr:  { empty: '+WorkR',  filled: '★ WorkR'  },
  seller: { empty: '+Seller', filled: '★ Seller' }
};
function noteLabelFor(bucket, hasContent) {
  const p = BUCKET_LABELS[bucket];
  if (!p) return hasContent ? '★ Note' : '+Note';
  return hasContent ? p.filled : p.empty;
}
function noteLabel(key, hasContent) {
  // key may be a plain uid (Tabs 2/3/4) or uid_bucket (Tab 1)
  const m = key.match(/_(info|worko|workr|seller)$/);
  if (m) return noteLabelFor(m[1], hasContent);
  return hasContent ? '★ Note' : '+Note';
}

function exportBucket(bucket) {
  // bucket: 'info' | 'work' | 'seller'
  const d = collectData();
  const addr = (d.address || 'no_address').replace(/[^a-zA-Z0-9]+/g, '_').replace(/^_|_$/g, '');
  const dt = d.date || new Date().toISOString().slice(0, 10);

  // ─── Special case: 'work' bucket emits the Pinnacle Planner schema
  //     { title, left:[{done,task,start,finish}], right:[...] }
  if (bucket === 'work') {
    const addDays = (iso, n) => {
      const x = new Date(iso + 'T00:00:00');
      x.setDate(x.getDate() + n);
      return x.toISOString().slice(0, 10);
    };
    const t = (task, s, f) => ({ done:false, task, start:s, finish:f });
    const start = dt;
    const launch = addDays(start, 52);

    // ─── LEFT SIDE: SELLER'S TASKS ─────────────────────────────────
    const left = [
      t("Gather receipts, permits, warranties (roof, furnace, A/C, appliances)", start,             addDays(start,5)),
      t("Review & sign listing paperwork",                                       start,             addDays(start,2)),
      t("Meet with contractor / designer on-site",                               addDays(start,8),  addDays(start,9)),
      t("Approve repair & touch-up plan",                                        addDays(start,9),  addDays(start,10)),
      t("Complete repairs & touch-ups (handyman or DIY)",                        addDays(start,11), addDays(start,21)),
      t("Declutter & depersonalize (target 30–50% reduction)",                   addDays(start,11), addDays(start,23)),
      t("Pack away personal photos, religious items, valuables",                 addDays(start,11), addDays(start,23)),
      t("Deep clean entire home (professional or self)",                         addDays(start,22), addDays(start,23)),
      t("Cooperate with stager — approve furniture moves",                       addDays(start,24), addDays(start,28)),
      t("Final touch-ups per stager 'Priority One' list",                        addDays(start,28), addDays(start,30)),
      t("Walk home with agent before photo day",                                 addDays(start,36), addDays(start,36)),
      t("Vacate home during photography appointment",                            addDays(start,37), addDays(start,38)),
      t("Review & approve MLS description",                                      addDays(start,33), addDays(start,35)),
      t("Review & approve feature sheet / brochure draft",                       addDays(start,50), addDays(start,51)),
      t("Final walkthrough with agent before launch",                            addDays(start,51), addDays(start,51)),
      t("Vacate home for broker open house",                                     addDays(launch,2), addDays(launch,2)),
      t("Vacate home for all private showings",                                  addDays(launch,2), addDays(launch,20)),
      t("Keep home in show-ready condition daily",                               launch,            addDays(launch,20)),
      t("Review offers with agent",                                              addDays(launch,20),addDays(launch,22)),
      t("Sign accepted offer",                                                   addDays(launch,22),addDays(launch,22)),
      t("Cooperate with buyer inspection access",                                addDays(launch,23),addDays(launch,27)),
      t("Arrange moving / closing logistics",                                    addDays(launch,22),addDays(launch,35))
    ];

    // ─── RIGHT SIDE: AGENT'S TASKS ─────────────────────────────────
    const right = [
      t("Walkthrough & Property Assessment",             start,             start),
      t("Finalize Listing Paperwork",                    start,             addDays(start,2)),
      t("Send Pictures to Interior Designer",            addDays(start,2),  addDays(start,3)),
      t("Arrange Staging Plan",                          addDays(start,3),  addDays(start,7)),
      t("Coming Soon Sign Installation",                 addDays(start,7),  addDays(start,7)),
      t("Coordinate Contractor / Designer Visit",        addDays(start,8),  addDays(start,9)),
      t("Finalize Repairing Plan",                       addDays(start,9),  addDays(start,10)),
      t("Supervise Staging Work",                        addDays(start,24), addDays(start,28)),
      t("Create Highlight Cards",                        addDays(start,28), addDays(start,30)),
      t("Create Highlight Sheet",                        addDays(start,30), addDays(start,32)),
      t("Write MLS Description",                         addDays(start,32), addDays(start,35)),
      t("Arrange Photographing Appointment",             addDays(start,35), addDays(start,36)),
      t("Photographing / Verify Measurement",            addDays(start,37), addDays(start,38)),
      t("Photo Editing & Selection",                     addDays(start,38), addDays(start,42)),
      t("Virtual Tour / Video Walkthrough",              addDays(start,42), addDays(start,43)),
      t("Put on Digital Lockbox",                        addDays(start,43), addDays(start,43)),
      t("MLS Listing Setup",                             addDays(start,44), addDays(start,45)),
      t("Instagram / Facebook Marketing Setup",          addDays(start,45), addDays(start,46)),
      t("WeChat / LinkedIn Marketing Setup",             addDays(start,46), addDays(start,49)),
      t("Neighbourhood Flyer Distribution",              addDays(start,49), addDays(start,49)),
      t("Email Blast to Agent Network",                  addDays(start,49), addDays(start,50)),
      t("Feature Sheet / Brochure Design",               addDays(start,50), addDays(start,51)),
      t("Pre-Launch Quality Check",                      addDays(start,51), addDays(start,51)),
      t("MLS Live on Market",                            launch,            launch),
      t("Social Media Launch Campaign",                  launch,            addDays(launch,1)),
      t("Broker Open House",                             addDays(launch,2), addDays(launch,2)),
      t("Private Showings - Week 1",                     addDays(launch,2), addDays(launch,8)),
      t("Virtual Open House #1",                         addDays(launch,3), addDays(launch,3)),
      t("Showing Feedback Collection - Week 1",          addDays(launch,4), addDays(launch,8)),
      t("Strategy Review & Price Check",                 addDays(launch,8), addDays(launch,8)),
      t("Private Showings - Week 2",                     addDays(launch,9), addDays(launch,15)),
      t("Virtual Open House #2",                         addDays(launch,10),addDays(launch,10)),
      t("Social Media Boost / Retargeting",              addDays(launch,11),addDays(launch,13)),

      t("File Closing & Documentation",                  addDays(launch,27),addDays(launch,27))
    ];

    // Append walk-through WorkO notes (owner) → LEFT, WorkR notes (realtor) → RIGHT
    const cleanRoom = (sectionTitle) => {
      let s = sectionTitle.replace(/^(Arrival|Walk-Through|Wrap-Up)\s*·\s*/, '');
      s = s.replace(/^\d+\.\s*/, '');
      s = s.replace(/\s*\(.*?\)\s*$/, '');
      s = s.replace(/\s*—\s*/, ' — ');
      return s.trim();
    };
    TABS[0].sections.forEach((sec, si) => {
      sec.items.forEach((item, ii) => {
        const room = cleanRoom(sec.title);
        const oNote = (d.notes || {})['t0_s' + si + '_i' + ii + '_worko'];

          left.push(t(room + ": " + oNote.trim(), addDays(start,11), addDays(start,21)));

        if (rNote && rNote.trim()) {
          right.push(t(room + ": " + rNote.trim(), addDays(start,11), addDays(start,21)));

    });

    const out = { title: d.address || '', left, right };
    const blob = new Blob([JSON.stringify(out, null, 2)], { type: 'application/json' });

    a.href = URL.createObjectURL(blob);

  }

  // ─── Default case: Info / Seller buckets emit {entries:[...]}
  const out = {
    bucket,
    address: d.address,
    client: d.client,
    walkthroughDate: dt,
    exportedAt: new Date().toISOString(),
    entries: []
  };
  TABS[0].sections.forEach((sec, si) => {
    sec.items.forEach((item, ii) => {
      const key = 't0_s' + si + '_i' + ii + '_' + bucket;
      const note = (d.notes || {})[key];
      if (!note || !note.trim()) return;
      out.entries.push({
        section: sec.title,
        prompt: item.anchor || item.text || '',
        type: item.type,
        note: note.trim()
      });
    });
  });
  if (out.entries.length === 0) {
    toast('No ' + bucket + ' notes to export');
    return;
  }
  const filenames = { info:'LP_Info', seller:'LP_seller' };
  const blob = new Blob([JSON.stringify(out, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `${filenames[bucket]}_${addr}_${dt}.json`;
  a.click();
  toast(filenames[bucket] + ' exported (' + out.entries.length + ' notes)');
}

  a.href = URL.createObjectURL(blob);
  a.download = `LP_Script_Notes_${addr}_${dt}.json`;
  a.click();

}
