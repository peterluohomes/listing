<title>Home Feature Check Lists — Pinnacle Listing System</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --navy: #1B2A4A;
  --navy-light: #2A3F6A;
  --gold: #C5A55A;
  --gold-light: #D4BB7A;
  --gold-bg: #FAF6ED;
  --cream: #FDFBF7;
  --white: #FFFFFF;
  --text: #222222;
  --text-mid: #555555;
  --text-light: #888888;
  --border: #E8E4DC;
  --border-light: #F0ECE4;
  --red-new: #C0392B;
  --green: #27AE60;
  --shadow: 0 2px 12px rgba(27,42,74,0.08);
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'DM Sans',sans-serif; background:var(--cream); color:var(--text); line-height:1.5; -webkit-font-smoothing:antialiased; }

.header { background:var(--navy); padding:24px 16px 18px; text-align:center; position:sticky; top:0; z-index:100; box-shadow:0 4px 20px rgba(27,42,74,0.3); }
.header-sub { font-size:10px; font-weight:700; letter-spacing:3px; text-transform:uppercase; color:var(--gold); margin-bottom:4px; }
.header-title { font-family:'Playfair Display',serif; font-size:24px; font-weight:700; color:#fff; }
.header-meta { font-size:11px; color:rgba(255,255,255,0.45); margin-top:6px; }
.progress-wrap { background:rgba(255,255,255,0.1); height:4px; border-radius:2px; margin-top:14px; overflow:hidden; }
.progress-bar { height:100%; background:linear-gradient(90deg,var(--gold),var(--gold-light)); border-radius:2px; transition:width .4s; width:0; }
.progress-text { font-size:11px; color:var(--gold-light); margin-top:5px; font-weight:500; }
.controls { display:flex; gap:6px; justify-content:center; flex-wrap:wrap; margin-top:12px; }
.ctrl-btn { background:rgba(255,255,255,0.08); border:1px solid rgba(255,255,255,0.15); color:rgba(255,255,255,0.65); font-family:'DM Sans',sans-serif; font-size:11px; font-weight:600; padding:4px 12px; border-radius:20px; cursor:pointer; transition:all .2s; }
.ctrl-btn:hover { background:rgba(255,255,255,0.15); color:#fff; }
.ctrl-btn.active { background:var(--gold); color:var(--navy); border-color:var(--gold); }

.container { max-width:900px; margin:0 auto; padding:16px 14px 80px; }

.prop-bar { background:#fff; border:1px solid var(--border); border-radius:10px; padding:12px 14px; margin-bottom:14px; box-shadow:var(--shadow); }
.prop-fields { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
.prop-bar label { font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:1px; color:var(--text-light); display:block; margin-bottom:2px; }
.prop-bar input { width:100%; border:none; border-bottom:2px solid var(--border); font-family:'DM Sans',sans-serif; font-size:14px; font-weight:600; color:var(--navy); padding:3px 0; background:transparent; outline:none; }
.prop-bar input:focus { border-bottom-color:var(--gold); }
.prop-bar input::placeholder { color:#ccc; font-weight:400; }

.part-div { text-align:center; padding:28px 16px 20px; }
.part-label { font-family:'Playfair Display',serif; font-size:18px; font-weight:700; color:var(--navy); }
.part-desc { font-size:12px; color:var(--text-light); font-style:italic; margin-top:2px; }
.part-line { width:50px; height:2px; background:var(--gold); margin:10px auto 0; }

.section { margin-bottom:12px; }
.sec-hdr { display:flex; align-items:center; gap:8px; padding:10px 14px; background:var(--navy); border-radius:8px 8px 0 0; cursor:pointer; user-select:none; }
.sec-hdr:hover { background:var(--navy-light); }
.sec-chev { color:var(--gold); font-size:16px; transition:transform .3s; width:18px; text-align:center; }
.section.collapsed .sec-chev { transform:rotate(-90deg); }
.sec-title { font-family:'Playfair Display',serif; font-size:15px; font-weight:600; color:#fff; flex:1; }
.sec-new { font-size:9px; font-weight:700; color:#fff; background:var(--red-new); padding:2px 7px; border-radius:8px; }
.sec-count { font-size:11px; color:var(--gold-light); font-weight:600; }
.sec-body { background:#fff; border:1px solid var(--border); border-top:none; border-radius:0 0 8px 8px; overflow:hidden; box-shadow:var(--shadow); }
.section.collapsed .sec-body { display:none; }

.feat-row { padding:10px 14px; border-bottom:1px solid var(--border-light); }
.feat-row:last-child { border-bottom:none; }
.feat-top { display:flex; align-items:flex-start; gap:6px; }
.feat-label { font-weight:700; font-size:13px; color:var(--navy); white-space:nowrap; flex-shrink:0; padding-top:1px; }
.feat-new-dot { display:inline-block; width:6px; height:6px; background:var(--red-new); border-radius:50%; flex-shrink:0; margin-top:7px; }
.feat-opts { flex:1; display:flex; flex-wrap:wrap; gap:3px 10px; align-items:baseline; min-width:0; }
.feat-plus { flex-shrink:0; width:24px; height:24px; border:1.5px solid var(--border); border-radius:50%; cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:15px; color:var(--text-light); margin-left:6px; background:#fff; transition:all .2s; line-height:1; }
.feat-plus:hover { border-color:var(--gold); color:var(--gold); background:var(--gold-bg); }
.feat-plus.active { background:var(--navy); border-color:var(--navy); color:#fff; transform:rotate(45deg); }

.opt { display:inline-flex; align-items:center; gap:3px; cursor:pointer; padding:2px 0; font-size:12.5px; color:var(--text-mid); transition:color .15s; user-select:none; }
.opt:hover { color:var(--navy); }
.opt-box { width:15px; height:15px; border:1.5px solid var(--border); border-radius:3px; display:inline-flex; align-items:center; justify-content:center; flex-shrink:0; transition:all .15s; background:#fff; }
.opt.checked .opt-box { background:var(--green); border-color:var(--green); }
.opt-box::after { content:''; display:none; width:4px; height:7px; border:solid #fff; border-width:0 1.5px 1.5px 0; transform:rotate(45deg) translateY(-1px); }
.opt.checked .opt-box::after { display:block; }
.opt.checked { color:var(--navy); font-weight:500; }

.note-wrap { display:none; padding:6px 0 2px 0; margin-top:6px; }
.note-wrap.open { display:block; }
.note-area { width:100%; border:1.5px solid var(--border); border-radius:6px; padding:7px 10px; font-family:'DM Sans',sans-serif; font-size:12px; color:var(--text); resize:vertical; min-height:32px; max-height:120px; background:var(--cream); outline:none; }
.note-area:focus { border-color:var(--gold); background:#fff; }
.note-area::placeholder { color:var(--text-light); }

@media(max-width:600px) {
  .header { padding:18px 12px 14px; }
  .header-title { font-size:20px; }
  .prop-fields { grid-template-columns:1fr; }
  .feat-opts { gap:2px 8px; }
  .opt { font-size:12px; }
}
</style>

let st={c:{},n:{},prop:{address:'',mls:'',date:'',agent:''}};
let filter='all';
function save(){try{localStorage.setItem('pcl3',JSON.stringify(st))}catch(e){}}
function load(){try{const s=localStorage.getItem('pcl3');if(s)st=JSON.parse(s)}catch(e){}}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

function render(){
  load();
  const app=document.getElementById('app');
  let h='';
  h+=`<div class="prop-bar"><div class="prop-fields">
    <div><label>Property Address</label><input placeholder="123 Main St, Toronto" value="${esc(st.prop.address)}" oninput="up('address',this.value)"></div>
    <div><label>MLS #</label><input placeholder="W1234567" value="${esc(st.prop.mls)}" oninput="up('mls',this.value)"></div>
    <div><label>Visit Date</label><input type="date" value="${esc(st.prop.date)}" oninput="up('date',this.value)"></div>
    <div><label>Agent</label><input placeholder="Agent name" value="${esc(st.prop.agent)}" oninput="up('agent',this.value)"></div>
  </div></div>`;

  let sIdx=0,totalO=0,checkedO=0;
  for(const entry of DATA){
    if(entry.part){
      h+=`<div class="part-div"><div class="part-label">${entry.part}</div><div class="part-desc">${entry.pd}</div><div class="part-line"></div></div>`;
      continue;
    }
    let sT=0,sC=0;
    entry.items.forEach((item,iIdx)=>{
      item[1].split('|').forEach((_,oIdx)=>{
        const k=`${sIdx}-${iIdx}-${oIdx}`;sT++;totalO++;
        if(st.c[k]){sC++;checkedO++;}
      });
    });

    let anyVis=filter==='all';
    if(!anyVis){
      entry.items.forEach((item,iIdx)=>{
        const isNew=!!item[2];
        const hasNote=!!(st.n[`${sIdx}-${iIdx}`]&&st.n[`${sIdx}-${iIdx}`].trim());
        const hasChk=item[1].split('|').some((_,oIdx)=>st.c[`${sIdx}-${iIdx}-${oIdx}`]);
        if(filter==='checked'&&hasChk)anyVis=true;
        if(filter==='notes'&&hasNote)anyVis=true;
        if(filter==='new'&&isNew)anyVis=true;
      });
    }
    if(!anyVis){sIdx++;continue;}

    h+=`<div class="section" id="s${sIdx}"><div class="sec-hdr" onclick="togSec(${sIdx})"><span class="sec-chev">&#9662;</span><span class="sec-title">${entry.t}</span>`;
    if(entry.isNew)h+=`<span class="sec-new">NEW</span>`;
    h+=`<span class="sec-count" id="sc${sIdx}">${sC}/${sT}</span></div><div class="sec-body">`;

    entry.items.forEach((item,iIdx)=>{
      const opts=item[1].split('|');
      const isNew=!!item[2];
      const nk=`${sIdx}-${iIdx}`;
      const hasNote=!!(st.n[nk]&&st.n[nk].trim());
      const hasChk=opts.some((_,oIdx)=>st.c[`${sIdx}-${iIdx}-${oIdx}`]);
      let vis=true;
      if(filter==='checked'&&!hasChk)vis=false;
      if(filter==='notes'&&!hasNote)vis=false;
      if(filter==='new'&&!isNew)vis=false;
      if(!vis)return;

      h+=`<div class="feat-row"><div class="feat-top"><span class="feat-label">${item[0]}:</span>`;
      if(isNew)h+=`<span class="feat-new-dot" title="New item"></span>`;
      h+=`<div class="feat-opts">`;
      opts.forEach((opt,oIdx)=>{
        const ok=`${sIdx}-${iIdx}-${oIdx}`;
        h+=`<span class="opt${st.c[ok]?' checked':''}" onclick="togOpt(this,'${ok}',${sIdx})"><span class="opt-box"></span>${opt.trim()}</span>`;
      });
      h+=`</div><div class="feat-plus${hasNote?' active':''}" onclick="togNote('${nk}',this)" title="Add note">+</div></div>`;
      h+=`<div class="note-wrap${hasNote?' open':''}" id="nw${nk}"><textarea class="note-area" id="na${nk}" placeholder="Add a note…" oninput="unote('${nk}',this.value)">${esc(st.n[nk]||'')}</textarea></div></div>`;
    });
    h+=`</div></div>`;
    sIdx++;
  }
  app.innerHTML=h;
  updProg(checkedO,totalO);
}

function togOpt(el,key,sIdx){
  st.c[key]=!st.c[key];
  if(!st.c[key])delete st.c[key];
  save();
  el.classList.toggle('checked',!!st.c[key]);
  updSecCt(sIdx);
  updProgLive();
}

function togNote(nk,btn){
  const w=document.getElementById('nw'+nk);
  const o=!w.classList.contains('open');
  w.classList.toggle('open');
  btn.classList.toggle('active');
  if(o)document.getElementById('na'+nk).focus();
}

function unote(nk,v){st.n[nk]=v;save();}
function up(f,v){st.prop[f]=v;save();}
function togSec(i){document.getElementById('s'+i).classList.toggle('collapsed');}

function updSecCt(sIdx){
  let si=0;
  for(const e of DATA){
    if(e.part)continue;
    if(si===sIdx){
      let c=0,t=0;
      e.items.forEach((item,iIdx)=>{item[1].split('|').forEach((_,oIdx)=>{t++;if(st.c[`${si}-${iIdx}-${oIdx}`])c++;});});
      const el=document.getElementById('sc'+si);
      if(el)el.textContent=`${c}/${t}`;
      return;
    }
    si++;
  }
}

function updProg(c,t){
  const p=t>0?(c/t*100):0;
  document.getElementById('pBar').style.width=p.toFixed(1)+'%';
  document.getElementById('pText').textContent=`${c} / ${t} options checked (${p.toFixed(0)}%)`;
}

function updProgLive(){
  let t=0,c=0,si=0;
  for(const e of DATA){
    if(e.part)continue;
    e.items.forEach((item,iIdx)=>{item[1].split('|').forEach((_,oIdx)=>{t++;if(st.c[`${si}-${iIdx}-${oIdx}`])c++;});});
    si++;
  }
  updProg(c,t);
}

document.querySelectorAll('.ctrl-btn[data-filter]').forEach(b=>{
  b.addEventListener('click',()=>{
    document.querySelectorAll('.ctrl-btn[data-filter]').forEach(x=>x.classList.remove('active'));
    b.classList.add('active');filter=b.dataset.filter;render();
  });
});

function resetAll(){
  if(confirm('Reset all checkmarks and notes? This cannot be undone.')){
    st={c:{},n:{},prop:{address:'',mls:'',date:'',agent:''}};
    save();filter='all';
    document.querySelectorAll('.ctrl-btn[data-filter]').forEach(b=>b.classList.remove('active'));
    document.querySelector('.ctrl-btn[data-filter="all"]').classList.add('active');
    render();
  }
}

render();
</script>
